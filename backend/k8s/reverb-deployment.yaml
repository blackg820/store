apiVersion: apps/v1
kind: Deployment
metadata:
  name: storify-reverb
  namespace: storify-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storify-reverb
  template:
    metadata:
      labels:
        app: storify-reverb
    spec:
      containers:
      - name: reverb
        image: storify/backend:latest
        command: ["php", "artisan", "reverb:start", "--port=8080"]
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: storify-env
---
apiVersion: v1
kind: Service
metadata:
  name: storify-reverb-service
  namespace: storify-prod
spec:
  selector:
    app: storify-reverb
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
